<!DOCTYPE html>
<html>
<head>
  <title>My First AR App</title>

  <!-- A-Frame Library -->
  <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
</head>

<body>
  <a-scene>

    <!-- Camera (VERY IMPORTANT) -->
    <a-entity camera look-controls position="0 1.6 5"></a-entity>

    <!-- Light -->
    <a-entity light="type: ambient; intensity: 1"></a-entity>
    <a-entity light="type: directional; intensity: 1" position="1 1 1"></a-entity>

    <!-- Box -->
    <a-box 
      position="0 1 -3"
      color="blue"
      scale="1 1 1"
      animation="property: rotation; to: 0 360 0; loop: true; dur: 3000">
    </a-box>

    <!-- Ground -->
    <a-plane 
      rotation="-90 0 0"
      width="10"
      height="10"
      color="#ccc">
    </a-plane>

  </a-scene>
</body>
</html>
